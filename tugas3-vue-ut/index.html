<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITTA - Universitas Terbuka</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div id="app" v-cloak>
        <header class="navbar">
            <h1>SITTA <span class="text-primary">UT</span></h1>
            <nav class="nav-links">
                <button :class="{ active: tab === 'stok' }" @click="tab = 'stok'">📦 Stok Bahan Ajar</button>
                <button :class="{ active: tab === 'tracking' }" @click="tab = 'tracking'">🚚 Tracking DO</button>
            </nav>
        </header>

        <main class="container">
            <transition name="fade" mode="out-in">
                <!-- Halaman Stok -->
                <section v-show="tab === 'stok'" class="view-section">
                    <ba-stock-table :items="state.stok" :upbjj-list="state.upbjjList" :kategori-list="state.kategoriList"></ba-stock-table>
                </section>
            </transition>

            <transition name="fade" mode="out-in">
                <!-- Halaman Tracking -->
                <section v-show="tab === 'tracking'" class="view-section">
                    <do-tracking :data="state.tracking" :pengiriman-list="state.pengirimanList" :paket-list="state.paket"></do-tracking>
                </section>
            </transition>

            <!--  Modal Component -->
            <app-modal ref="modal"></app-modal>
        </main>
    </div>

    <!-- Scripts (Urutan Sangat Penting) -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="/js/services/api.js"></script>
    <script src="/js/components/app-modal.js"></script>
    <script src="/js/components/status-badge.js"></script>
    <script src="/js/components/stock-table.js"></script>
    <script src="/js/components/do-tracking.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
